services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # For development with hot-reload, uncomment the volume mount below:
    # volumes:
    #   - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      japan-economic-dashboard-net:
        aliases:
          - japan-economic-dashboard-api

networks:
  japan-economic-dashboard-net:
    name: japan-economic-dashboard-net
